name: Agentic Refactor + Full Invariant Preservation (Qwen2-0.5B + Lean 4)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qwen2-refactor-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Qwen2-0.5B on CPU)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers huggingface_hub accelerate

      - name: Create spec file
        run: |
          mkdir -p specs
          cat > specs/account_refactor.spec << 'EOF'
          Refactor the Account module as follows:
          - Change internal storage from Vec<(String, i64)> to HashMap String Int
          - Add support for batch_deposit (multiple deposits in one call)
          EOF

      - name: Create static Theorem File
        run: |
          mkdir -p proofs
          cat > proofs/theorems_template.lean << 'EOF'
          -- DO NOT REMOVE: Your static invariant theorems
          
          -- Your custom proofs/theorems would go here
          theorem non_negative_balance : True := by trivial
          theorem money_conservation : True := by trivial
          theorem audit_integrity : True := by trivial
          theorem no_silent_failures : True := by trivial

          -- End of Static Theorems
          EOF

      - name: Run Qwen2-0.5B agent (With Pure Lean 4 Few-Shot Examples)
        run: |
          python - << 'PYEOF'
          import os
          from transformers import AutoModelForCausalLM, AutoTokenizer
          import torch

          print("--- STEP 1: Loading Model ---")
          model_name = "Qwen/Qwen2-0.5B-Instruct"
          tokenizer = AutoTokenizer.from_pretrained(model_name)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              dtype=torch.float32,
              device_map="auto"
          )

          print("\n--- STEP 2: Loading Specification & Theorems ---")
          with open("specs/account_refactor.spec") as f:
              spec = f.read()
              
          with open("proofs/theorems_template.lean") as f:
              theorems = f.read()

          # Providing a strict few-shot example forces the model to use Lean 4 syntax
          prompt = f"""You are a software engineer specializing in Lean 4 formal methods.
          Your task is to refactor a Lean 4 module.
          
          Request:
          {spec}

          Here is an example of what valid Lean 4 syntax looks like:
          structure Account where
            id : String
            balance : Int
            transactions : List (String × Int)

          def deposit (acc : Account) (amount : Int) : Account :=
            {{ acc with balance := acc.balance + amount }}

          Instructions:
          1. Provide ONLY valid Lean 4 code. No Rust, no C++, no markdown blocks.
          2. Output the new 'structure Account' and the requested functions.
          3. Do NOT output any theorems or text explanations. Start your response directly with Lean 4 code.
          """

          print("\n--- STEP 3: Prompt Sent to Qwen ---")
          print(prompt)
          print("-" * 40)

          inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
          
          print("\n--- STEP 4: Generating Implementation ---")
          outputs = model.generate(
              **inputs,
              max_new_tokens=1000,
              temperature=0.05,
              do_sample=False,
              pad_token_id=tokenizer.eos_token_id
          )

          generated = tokenizer.decode(outputs[0], skip_special_tokens=True)
          impl_code = generated[len(prompt):].strip()
          
          print("\n--- STEP 5: Raw Output from Model ---")
          print(impl_code)
          print("-" * 40)

          # Stamping the model's generated data structure ahead of the theorems
          final_file_content = f"import Std.Data.HashMap\nopen Std\n\n{impl_code}\n\n{theorems}"

          output_path = "proofs/agent_refactored_account.lean"
          with open(output_path, "w") as f:
              f.write(final_file_content)

          print(f"File stitched and saved to {output_path}")
          PYEOF

      - name: Cache Lean Lake
        uses: actions/cache@v4
        with:
          path: ~/.lake
          key: lean4-lake-${{ hashFiles('lakefile.lean') }}

      - name: Lean 4 machine-checked verification
        uses: leanprover/lean-action@v1
        with:
          auto-config: true
          lean4checker: true

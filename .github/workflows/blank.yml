name: Agentic Refactor + Full Invariant Preservation (Qwen2-0.5B + Lean 4)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qwen2-refactor-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Qwen2-0.5B on CPU)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers huggingface_hub accelerate

      - name: Install Elan and set default toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Pre-warm Lean toolchain
        run: |
          elan run stable lean --version

      - name: Create Static Spec File (Frontier Authored)
        run: |
          mkdir -p proofs
          cat > proofs/frontier_specs.lean << 'EOF'
          import Std.Data.HashMap

          structure AccountState where
            balances : Std.HashMap String Int
            audit_trail : List (String × Int)

          def batch_deposit (state : AccountState) (deposits : List (String × Int)) : AccountState :=
            sorry

          theorem non_negative_balance (state : AccountState) (deposits : List (String × Int)) :
            (∀ s ∈ state.balances.toList, s.2 ≥ 0) → 
            (∀ d ∈ deposits, d.2 ≥ 0) → 
            ∀ s ∈ (batch_deposit state deposits).balances.toList, s.2 ≥ 0 := by
            sorry

          theorem money_conservation (state : AccountState) (deposits : List (String × Int)) :
            true := by 
            sorry

          theorem audit_integrity (state : AccountState) (deposits : List (String × Int)) :
            (batch_deposit state deposits).audit_trail.length = state.audit_trail.length + deposits.length := by
            sorry

          theorem no_silent_failures (state : AccountState) (deposits : List (String × Int)) :
            deposits ≠ [] → (batch_deposit state deposits) ≠ state := by
            sorry
          EOF

      - name: Run Self-Correcting Generator
        run: |
          python - << 'PYEOF'
          import os
          import subprocess
          import re
          from transformers import AutoModelForCausalLM, AutoTokenizer
          import torch

          model_name = "Qwen/Qwen2-0.5B-Instruct"
          print(f"Loading model: {model_name}")
          tokenizer = AutoTokenizer.from_pretrained(model_name)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              dtype=torch.float32,
              device_map="auto",
              trust_remote_code=True
          )

          # Read the perfect specs we generated
          with open("proofs/frontier_specs.lean", "r") as f:
              specs = f.read()

          lean_file_path = "proofs/agent_refactored_account.lean"
          attempts = 3
          current_attempt = 1
          last_error = ""

          while current_attempt <= attempts:
              print(f"--- Generator Attempt {current_attempt}/{attempts} ---")
              
              if current_attempt == 1:
                  generator_prompt = f"""You are a functional programming engineer. Your task is to implement the function and prove the theorems in the following Lean 4 file.
                  
                  File Skeleton:
                  {specs}

                  Instructions:
                  1. Output ONLY a valid, complete Lean 4 file. Do NOT include any markdown blocks.
                  2. Replace all instances of `sorry` with actual implementations and proofs.
                  3. Do not change the theorem names or signatures."""
              else:
                  generator_prompt = f"""Your previous attempt failed to compile in Lean 4 with this error:
                  
                  {last_error}

                  Please rewrite the entire file. Fix the error. Ensure all proofs are solved without using `sorry`. Output ONLY the raw Lean 4 code."""

              inputs = tokenizer(generator_prompt, return_tensors="pt").to(model.device)
              outputs = model.generate(**inputs, max_new_tokens=2000, temperature=0.2, do_sample=True, pad_token_id=tokenizer.eos_token_id)
              generator_output = tokenizer.decode(outputs[0], skip_special_tokens=True).strip()

              # Scrub markdown just in case
              cleaned_output = re.sub(r"(?i)^```lean\s*", "", generator_output)
              cleaned_output = re.sub(r"^```\s*", "", cleaned_output)
              cleaned_output = re.sub(r"```$", "", cleaned_output).strip()

              with open(lean_file_path, "w") as f:
                  f.write(cleaned_output)

              # Call Lean directly
              result = subprocess.run(["elan", "run", "stable", "lean", lean_file_path], capture_output=True, text=True)

              if result.returncode == 0:
                  print("✅ SUCCESS: Lean 4 compiled the file perfectly!")
                  break
              else:
                  print(f"❌ Lean 4 failed on this attempt.")
                  last_error = result.stderr if result.stderr.strip() else result.stdout
                  print(f"Compiler Error:\n{last_error}\n")
                  current_attempt += 1

          if current_attempt > attempts:
              print("❌ FAILED: The Generator could not produce valid proofs after 3 attempts.")
              exit(1)
          PYEOF

      - name: Assertion checks
        run: |
          echo "🔍 Verifying Lean output didn't drop names..."
          grep -H "theorem non_negative_balance" proofs/agent_refactored_account.lean
          grep -H "theorem money_conservation" proofs/agent_refactored_account.lean
          grep -H "theorem audit_integrity" proofs/agent_refactored_account.lean
          grep -H "theorem no_silent_failures" proofs/agent_refactored_account.lean
          echo "Done!"

name: Agentic Refactor + Full Invariant Preservation (Qwen2-0.5B + Lean 4)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qwen2-refactor-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Qwen2-0.5B on CPU)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers huggingface_hub accelerate

      - name: Install Elan and set default toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain stable
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Create directories and spec file
        run: |
          mkdir -p specs proofs
          cat > specs/account_refactor.spec << 'EOF'
          Refactor the Account module as follows:
          - Change internal storage from Vec<(String, i64)> to HashMap<String, i64>
          - Add support for batch_deposit (multiple deposits in one call)
          - Preserve EVERY invariant listed below. Do not omit any.

          Required invariants:
          1. non_negative_balance: ∀ accounts, balance >= 0 after any operation
          2. money_conservation: total sum of all balances remains constant
          3. audit_integrity: every successful operation appends exactly one entry to the audit trail
          4. no_silent_failures: every operation that changes state must be logged

          Output ONLY a complete Lean 4 file.
          EOF

      - name: Run Self-Correcting Actor-Critic Pipeline
        run: |
          python - << 'PYEOF'
          import os
          import subprocess
          from transformers import AutoModelForCausalLM, AutoTokenizer
          import torch

          os.makedirs("proofs", exist_ok=True)

          model_name = "Qwen/Qwen2-0.5B-Instruct"
          print(f"Loading model: {model_name}")
          tokenizer = AutoTokenizer.from_pretrained(model_name)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              dtype=torch.float32,
              device_map="auto",
              trust_remote_code=True
          )

          with open("specs/account_refactor.spec") as f:
              spec = f.read()

          # --- STEP 1: THE AUDITOR (Generates locked specs) ---
          auditor_prompt = f"""You are a strict safety auditor. Read the requested specification. 
          Your job is ONLY to extract the requested invariants and write their rigid Lean 4 `theorem` headers. 
          Do NOT write actual implementations or proofs.

          Spec Request:
          {spec}

          Output ONLY valid Lean 4 theorem declarations using these names: 
          `non_negative_balance`, `money_conservation`, `audit_integrity`, `no_silent_failures`."""

          inputs = tokenizer(auditor_prompt, return_tensors="pt").to(model.device)
          outputs = model.generate(**inputs, max_new_tokens=500, temperature=0.1, do_sample=True, pad_token_id=tokenizer.eos_token_id)
          auditor_specifications = tokenizer.decode(outputs[0], skip_special_tokens=True).strip()

          print("\n=== AUDITOR RIGID SPECIFICATIONS ===")
          print(auditor_specifications)
          print("====================================\n")


          # --- STEP 2: THE GENERATOR WITH SELF-CORRECTION LOOP ---
          lean_file_path = "proofs/agent_refactored_account.lean"
          attempts = 3
          current_attempt = 1
          last_error = ""

          while current_attempt <= attempts:
              print(f"--- Generator Attempt {current_attempt}/{attempts} ---")
              
              if current_attempt == 1:
                  generator_prompt = f"""You are a functional programming engineer. 
                  Refactor the system and satisfy the following strict safety theorems generated by our auditor.

                  Refactor request:
                  {spec}

                  Locked Invariants you must prove:
                  {auditor_specifications}

                  Output ONLY valid, complete Lean 4 code. No markdown outside code. Fill in proofs without 'sorry'."""
              else:
                  # If we failed on the last run, we force the AI to read Lean's exact complaint!
                  generator_prompt = f"""On your previous attempt to refactor the code, the Lean 4 compiler failed with this error:
                  
                  {last_error}

                  Rewrite the entire Lean 4 module. Fix the error above. Ensure all functions are implemented and all proofs for the auditor's invariants compile perfectly.
                  
                  Output ONLY the complete, corrected Lean 4 file."""

              inputs = tokenizer(generator_prompt, return_tensors="pt").to(model.device)
              outputs = model.generate(**inputs, max_new_tokens=2000, temperature=0.2, do_sample=True, pad_token_id=tokenizer.eos_token_id)
              generator_output = tokenizer.decode(outputs[0], skip_special_tokens=True).strip()

              with open(lean_file_path, "w") as f:
                  f.write(generator_output)

              # Call Lean directly to see if the file compiles!
              # We use 'elan run stable lean' to use the runner's Lean installation
              result = subprocess.run(["elan", "run", "stable", "lean", lean_file_path], capture_output=True, text=True)

              if result.returncode == 0:
                  print("✅ Lean 4 compiled the code and proofs perfectly!")
                  break
              else:
                  print(f"❌ Lean 4 failed to compile this attempt.")
                  last_error = result.stderr if result.stderr else result.stdout
                  print(f"Compiler Error:\n{last_error}\n")
                  current_attempt += 1

          if current_attempt > attempts:
              print("❌ FAILED: The Generator could not produce valid proofs after 3 attempts.")
              exit(1)
          PYEOF

      - name: Post-run assertion checks
        run: |
          echo "🔍 Double-checking strings for safety nets..."
          grep -H "theorem non_negative_balance" proofs/agent_refactored_account.lean
          grep -H "theorem money_conservation" proofs/agent_refactored_account.lean
          grep -H "theorem audit_integrity" proofs/agent_refactored_account.lean
          grep -H "theorem no_silent_failures" proofs/agent_refactored_account.lean
          echo "Done!"

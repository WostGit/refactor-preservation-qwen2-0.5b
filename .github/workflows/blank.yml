name: Agentic Refactor + Full Invariant Preservation (Qwen2-0.5B + Lean 4)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qwen2-refactor-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Qwen2-0.5B on CPU)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers huggingface_hub accelerate

      - name: Create directories and spec file
        run: |
          mkdir -p specs proofs
          cat > specs/account_refactor.spec << 'EOF'
          Refactor the Account module as follows:
          - Change internal storage from Vec<(String, i64)> to HashMap<String, i64>
          - Add support for batch_deposit (multiple deposits in one call)
          - Preserve EVERY invariant listed below. Do not omit any.

          Required invariants (you MUST create a separate theorem for each):
          1. non_negative_balance: ∀ accounts, balance >= 0 after any operation
          2. money_conservation: total sum of all balances remains constant (no creation or destruction of money)
          3. audit_integrity: every successful operation appends exactly one entry to the audit trail
          4. no_silent_failures: every operation that changes state must be logged

          Output ONLY a complete Lean 4 file.
          EOF

      - name: Run Qwen2-0.5B agent (refactor + generate proof obligations)
        run: |
          python - << 'PYEOF'
          import os
          from transformers import AutoModelForCausalLM, AutoTokenizer
          import torch

          os.makedirs("proofs", exist_ok=True)

          model_name = "Qwen/Qwen2-0.5B-Instruct"
          tokenizer = AutoTokenizer.from_pretrained(model_name)
          model = AutoModelForCausalLM.from_pretrained(
              model_name,
              torch_dtype=torch.float16 if torch.cuda.is_available() else torch.float32,
              device_map="auto",
              trust_remote_code=True
          )

          with open("specs/account_refactor.spec") as f:
              spec = f.read()

          prompt = f"""You are a rigorous formal methods engineer. Your task is to perform the refactor while strictly preserving ALL specified invariants. Never drop or omit any invariant.

          Refactor request:
          {spec}

          Instructions (follow exactly):
          1. Output ONLY valid Lean 4 code. No explanations.
          2. Include the refactored data structure and all functions (including batch_deposit).
          3. For each of the 4 required invariants, write a full `theorem` statement using the exact name:
             - theorem non_negative_balance
             - theorem money_conservation
             - theorem audit_integrity
             - theorem no_silent_failures
          4. After the theorems, add a comment listing all four invariants you included.
          5. Do not use 'sorry' for the theorem statements.

          Begin your response with the complete Lean 4 code only."""

          inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
          outputs = model.generate(
              **inputs,
              max_new_tokens=2500,
              temperature=0.05,
              do_sample=False,
              pad_token_id=tokenizer.eos_token_id
          )

          generated = tokenizer.decode(outputs[0], skip_special_tokens=True)
          lean_code = generated.split("Lean 4 code")[-1].strip() if "Lean 4 code" in generated else generated.strip()

          with open("proofs/agent_refactored_account.lean", "w") as f:
              f.write(lean_code)

          print("Qwen2-0.5B generated refactor + proofs")
          PYEOF

      - name: Cache Lean Lake for faster builds
        uses: actions/cache@v4
        with:
          path: ~/.lake
          key: lean4-lake-${{ hashFiles('lakefile.lean') }}

      - name: Lean 4 machine-checked verification
        uses: leanprover/lean-action@v1
        with:
          auto-config: true
          lean4checker: true

      - name: STRICT CHECK — Ensure NO invariants were dropped
        run: |
          echo "🔍 Checking that Qwen2-0.5B did NOT drop any invariants (common LLM failure)..."
          
          grep -q "theorem non_negative_balance" proofs/agent_refactored_account.lean || { echo "❌ CRITICAL: non_negative_balance invariant DROPPED!"; exit 1; }
          grep -q "theorem money_conservation" proofs/agent_refactored_account.lean || { echo "❌ CRITICAL: money_conservation invariant DROPPED!"; exit 1; }
          grep -q "theorem audit_integrity" proofs/agent_refactored_account.lean || { echo "❌ CRITICAL: audit_integrity invariant DROPPED!"; exit 1; }
          grep -q "theorem no_silent_failures" proofs/agent_refactored_account.lean || { echo "❌ CRITICAL: no_silent_failures invariant DROPPED!"; exit 1; }
          
          if grep -q "error:" proofs/agent_refactored_account.lean || grep -q "sorry" proofs/agent_refactored_account.lean; then
            echo "❌ Lean found errors or incomplete proofs in agent output"
            exit 1
          fi
          
          echo "✅ SUCCESS: Qwen2-0.5B refactored the module"
          echo "    All 4 invariants explicitly included and machine-checked by Lean 4:"
          echo "    • non_negative_balance"
          echo "    • money_conservation"
          echo "    • audit_integrity"
          echo "    • no_silent_failures"
